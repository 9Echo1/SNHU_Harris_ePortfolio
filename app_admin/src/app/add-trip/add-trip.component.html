<div class="col-md-6 mx-auto mt-4">
  <h2 class="text-center mb-4">Add Trip</h2>

  <form *ngIf="addForm" [formGroup]="addForm" (ngSubmit)="onSubmit()">

    <div class="form-group mb-3">
      <label>Code:</label>
      <input type="text" formControlName="code"
        class="form-control"
        [ngClass]="{ 'is-invalid': submitted && f['code'].errors }">

      <div *ngIf="submitted && f['code'].errors" class="text-danger">
        Trip Code is required
      </div>
    </div>

    <div class="form-group mb-3">
      <label>Name:</label>
      <input type="text" formControlName="name"
        class="form-control"
        [ngClass]="{ 'is-invalid': submitted && f['name'].errors }">

      <div *ngIf="submitted && f['name'].errors" class="text-danger">
        Name is required
      </div>
    </div>

    <div class="form-group mb-3">
      <label>Length:</label>
      <input type="text" formControlName="length"
        class="form-control"
        placeholder="6 days / 5 nights"
        [ngClass]="{ 'is-invalid': submitted && f['length'].errors }">

      <div *ngIf="submitted && f['length'].errors" class="text-danger">
        Length is required
      </div>
    </div>

    <div class="form-group mb-3">
      <label>Start:</label>
      <input type="date" formControlName="start"
        class="form-control"
        [ngClass]="{ 'is-invalid': submitted && f['start'].errors }">

      <div *ngIf="submitted && f['start'].errors" class="text-danger">
        Date is required
      </div>
    </div>

    <div class="form-group mb-3">
      <label>Resort:</label>
      <input type="text" formControlName="resort"
        class="form-control"
        [ngClass]="{ 'is-invalid': submitted && f['resort'].errors }">

      <div *ngIf="submitted && f['resort'].errors" class="text-danger">
        Resort is required
      </div>
    </div>

    <div class="form-group mb-3">
      <label>Per Person:</label>
      <input type="number" formControlName="perPerson"
        class="form-control"
        [ngClass]="{ 'is-invalid': submitted && f['perPerson'].errors }">

      <div *ngIf="submitted && f['perPerson'].errors" class="text-danger">
        Per Person is required
      </div>
    </div>

    <div class="form-group mb-3">
      <label>Image Name:</label>
      <input type="text" formControlName="image"
        class="form-control"
        placeholder="reef2.png"
        [ngClass]="{ 'is-invalid': submitted && f['image'].errors }">

      <div *ngIf="submitted && f['image'].errors" class="text-danger">
        Image Name is required
      </div>
    </div>

    <div class="form-group mb-3">
      <label>Description:</label>
      <textarea formControlName="description"
        class="form-control"
        rows="4"
        [ngClass]="{ 'is-invalid': submitted && f['description'].errors }"></textarea>

      <div *ngIf="submitted && f['description'].errors" class="text-danger">
        Description is required
      </div>
    </div>

    <div *ngIf="formMessage" class="alert alert-danger mt-3">
      {{ formMessage }}
    </div>

    <button type="submit" class="btn btn-info">Save</button>
    <button type="button" class="btn btn-secondary ms-2" routerLink="/">Cancel</button>

  </form>
</div>
